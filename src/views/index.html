<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        h2 { margin-bottom: 20px; color: #333; }
        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .google-btn {
            background-color: #FF7043;
            color: white;
        }
        .google-btn:hover { background-color: #ff4800; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Welcome</h2>
  
        <!-- Google Login: Calls the backend endpoint directly -->
        <a href="/auth/google" style="text-decoration: none;">
            <button class="google-btn">Sign in with Google</button>
        </a>

    </div>
</body>
</html>
